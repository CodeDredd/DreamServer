schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: finance-social
  name: Finance Social Aggregator
  aliases: [finance-reddit]
  container_name: dream-finance-social
  host_env: FINANCE_SOCIAL_HOST
  default_host: finance-social
  port: 8099
  external_port_env: FINANCE_SOCIAL_PORT
  external_port_default: 8099
  health: /health
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: [timescaledb, embeddings, qdrant, finance-vector]

