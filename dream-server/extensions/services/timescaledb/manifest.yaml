schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: timescaledb
  name: TimescaleDB (Finance Time-Series)
  aliases: [tsdb, finance-tsdb]
  container_name: dream-timescaledb
  host_env: TIMESCALEDB_HOST
  default_host: timescaledb
  port: 5432
  external_port_env: TIMESCALEDB_PORT
  external_port_default: 5434
  # No HTTP health endpoint — Postgres is TCP-only. The container's
  # built-in healthcheck (pg_isready) in compose.yaml is the source of
  # truth; dream-cli's HTTP probe would always fail on this port.
  # Leaving `health` empty makes dream status skip it.
  health: ""
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: []

