services:
  n8n:
    # Pinned: 2.20.7 (released 2026-05-13). Bumped from 2.6.4 because that
    # tag was a year old and missed every recent fix to the OAuth callback
    # handler + the new code-node sandbox.  Bump procedure:
    #   1) Pick a tag from https://hub.docker.com/r/n8nio/n8n/tags
    #   2) Update both this line AND installers/phases/08-images.sh
    #   3) dream sync --pull --auto-restart   (preserve-state keeps it enabled)
    image: n8nio/n8n:2.20.7
    container_name: dream-n8n
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    security_opt:
      - no-new-privileges:true
    environment:
      - N8N_DEFAULT_ADMIN_EMAIL=${N8N_USER:?N8N_USER must be set in .env}
      - N8N_DEFAULT_ADMIN_PASSWORD=${N8N_PASS:?N8N_PASS must be set in .env}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${TIMEZONE:-UTC}
      # Tokens consumed by built-in workflows (see config/n8n/*.json).
      # n8n exposes process env to Code/HTTP nodes via {{ $env.NAME }}.
      - VIKUNJA_API_TOKEN=${VIKUNJA_API_TOKEN:-}
      - VIKUNJA_DEFAULT_PROJECT_ID=${VIKUNJA_DEFAULT_PROJECT_ID:-1}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - AGENT_BASE_URL=${AGENT_BASE_URL:-http://openclaw:18790}
      - AGENT_MODEL=${AGENT_MODEL:-openclaw}
      - AGENT_TRIGGER_LABEL=${AGENT_TRIGGER_LABEL:-agent}
      # finance-vector seeder bearer token, used by config/n8n/finance-vector-refresh.json
      - FINANCE_VECTOR_TOKEN=${FINANCE_VECTOR_TOKEN:-}
      # finance-prices intraday fetcher bearer token (POST /refresh).
      # See extensions/services/finance-prices/README.md → "Trigger from n8n".
      - FINANCE_PRICES_TOKEN=${FINANCE_PRICES_TOKEN:-}
      # finance-news aggregator bearer token (POST /refresh).
      - FINANCE_NEWS_TOKEN=${FINANCE_NEWS_TOKEN:-}
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./config/n8n:/home/node/workflows
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${N8N_PORT:-5678}:5678"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
