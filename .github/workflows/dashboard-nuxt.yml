name: Dashboard NG (Nuxt)

on:
  pull_request:
    paths:
      - 'dream-server/extensions/services/dashboard-nuxt/**'
      - '.github/workflows/dashboard-nuxt.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'dream-server/extensions/services/dashboard-nuxt/**'
      - '.github/workflows/dashboard-nuxt.yml'

jobs:
  lint-test:
    name: Lint + Unit-Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dream-server/extensions/services/dashboard-nuxt
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint
        run: pnpm run lint

      - name: Unit Tests (vitest)
        run: pnpm run test

      - name: Build (nuxt build)
        run: pnpm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-nuxt-coverage
          path: dream-server/extensions/services/dashboard-nuxt/coverage/
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-test
    defaults:
      run:
        working-directory: dream-server/extensions/services/dashboard-nuxt
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm run build

      - name: Start preview server (background)
        run: |
          pnpm run preview &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3011/ -o /dev/null; then
              echo "preview ready"
              exit 0
            fi
            sleep 1
          done
          echo "preview did not start in 30s"
          exit 1

      - name: Run Playwright tests
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3011
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dream-server/extensions/services/dashboard-nuxt/playwright-report/
          retention-days: 7

